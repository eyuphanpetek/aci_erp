<body>
  <!-- Content -->

  <div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
      <div class="authentication-inner py-6">
        <!-- Login -->
        <div class="card">
          <div class="card-body">
            <!-- Logo -->
            <div class="app-brand justify-content-center mb-6">
              <a href="index.html" class="app-brand-link">
                <span class="app-brand-logo demo">
                  <img src="../../assets/img/favicon/logo.png" alt="logo" height="26" />
                </span>
                <span class="app-brand-text demo text-heading fw-bold">AÇI ERP</span>
              </a>
            </div>
            <!-- /Logo -->
            <h4 class="mb-1">AÇI Eğitim Kurumları ERP'ye Hoş Geldiniz</h4>
            <p class="mb-6">Lütfen hesabınızla giriş yapın.</p>

            <form id="formAuthentication" class="mb-4" action="javascript:void(0);">
              <div class="mb-6 form-control-validation">
                <label for="email" class="form-label">E-posta Adresi</label>
                <input type="text" class="form-control" id="email" name="email-username"
                  placeholder="E-posta adresinizi girin" autofocus />
              </div>
              <div class="mb-6 form-password-toggle form-control-validation">
                <div class="d-flex justify-content-between">
                  <label class="form-label" for="password">Şifre</label>
                  <a href="javascript:void(0);"
                    onclick="alert('Lütfen şifrenizi sıfırlamak için sistem yöneticinizle (SuperAdmin) iletişime geçin.');">
                    <small>Şifremi Unuttum?</small>
                  </a>
                </div>
                <div class="input-group input-group-merge">
                  <input type="password" id="password" class="form-control" name="password"
                    placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                    aria-describedby="password" />
                  <span class="input-group-text cursor-pointer"><i class="icon-base ti tabler-eye-off"></i></span>
                </div>
              </div>
              <div class="my-8">
                <div class="d-flex justify-content-between">
                  <div class="form-check mb-0 ms-2">
                    <input class="form-check-input" type="checkbox" id="remember-me" />
                    <label class="form-check-label" for="remember-me"> Beni Hatırla </label>
                  </div>
                </div>
              </div>
              <div class="mb-6">
                <button class="btn btn-primary d-grid w-100" type="submit">Giriş Yap</button>
              </div>
            </form>
          </div>
        </div>
        <!-- /Login -->
      </div>
    </div>
  </div>

  <!-- / Content -->

  <!-- Core JS -->
  <!-- build:js assets/vendor/js/theme.js  -->

  <script src="../../assets/vendor/libs/jquery/jquery.js"></script>

  <script src="../../assets/vendor/libs/popper/popper.js"></script>
  <script src="../../assets/vendor/js/bootstrap.js"></script>
  <script src="../../assets/vendor/libs/node-waves/node-waves.js"></script>

  <script src="../../assets/vendor/libs/pickr/pickr.js"></script>

  <script src="../../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>

  <script src="../../assets/vendor/libs/hammer/hammer.js"></script>

  <script src="../../assets/vendor/js/menu.js"></script>

  <script src="../../assets/vendor/libs/@form-validation/auto-focus.js"></script>

  <!-- Main JS -->

  <script src="../../assets/js/main.js"></script>

  <!-- Page JS -->

  <!-- ERP Scripts -->
  <script src="../../assets/js/erp/api.js"></script>
  <script src="../../assets/js/erp/auth.js"></script>
  <script>
    document.getElementById('formAuthentication').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await ErpAuth.login(email, password);
        window.location.href = 'index.html';
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>

</html>
